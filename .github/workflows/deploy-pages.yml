name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Bun (cached)
        uses: ./.github/actions/setup-bun-cached

      - name: Compute base path for project pages
        id: base
        run: |
          # If deployed to a custom domain (CNAME file present) or as a user/org
          # site (<user>.github.io repo), use "/". Otherwise scope to the repo name.
          if [ -f public/CNAME ]; then
            echo "value=/" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REPOSITORY##*/}" == *.github.io ]]; then
            echo "value=/" >> "$GITHUB_OUTPUT"
          else
            echo "value=/${GITHUB_REPOSITORY##*/}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          VITE_BASE: ${{ steps.base.outputs.value }}
        run: bun run build

      - name: SPA fallback (404 = index)
        run: cp dist/index.html dist/404.html

      - name: Disable Jekyll processing
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
