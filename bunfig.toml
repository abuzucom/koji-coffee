[install]
# Install from the public npm registry. Pinned explicitly so the project stays
# independent of any private mirror regardless of the host environment.
registry = "https://registry.npmjs.org"
# 24h supply-chain guard: skip package versions published less than a day ago.
minimumReleaseAge = 86400
# Each entry bypasses the 24h guard for one package — confirm with the user
# before adding any.
minimumReleaseAgeExcludes = []
