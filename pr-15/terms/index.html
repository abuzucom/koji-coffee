    <!--
      Content Security Policy shipped as a meta tag so it applies on any static
      host (GitHub Pages does not let us configure response headers). The
      Cloudflare deployment additionally ships a `_headers` file with the same
      policy plus HSTS, X-Content-Type-Options, Referrer-Policy, etc.
      'unsafe-inline' on style-src is required by Tailwind's runtime-injected
      styles; there is no script 'unsafe-inline'.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'sha256-xC5ZZd0gpQvxcTPMSbpsGei+KUSMTPaetfQQP7e/Q1o='; font-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"
    />
    <!--
      Note: `frame-ancestors` is only enforced when delivered via HTTP response
      header, not via <meta>. It is set in `public/_headers` for the Cloudflare
      Pages deploy. GitHub Pages doesn't allow custom response headers, so
      clickjacking protection there relies on the browser's default same-origin
      framing behavior for `*.github.io` and on X-Frame-Options set upstream.
    -->
    <meta name="x-frame-options" content="DENY" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!--
      Blocking theme bootstrap: resolves the persisted or system preference
      before first paint to prevent a flash of the wrong theme. Kept tiny and
      inline so no separate script fetch is required.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("koji-theme");
          var theme = stored;
          if (!theme || theme === "system") {
            theme = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          document.documentElement.dataset.theme = theme;
        } catch (_err) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
